spring:
  config:
    import: "optional:configserver:"
  cloud:
    config:
      enabled: false
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false

keycloak:
  realm: industrial-safety

aws:
  s3:
    bucket-name: test-bucket

cloud:
  aws:
    credentials:
      access-key: test-access-key
      secret-key: test-secret-key
    region:
      static: us-east-1

eureka:
  client:
    enabled: false
