server:
  port: 8089

spring:
  application:
    name: conocimiento-service
  config:
    import: "aws-parameterstore:/config/application/,aws-parameterstore:/config/conocimiento-service/"
  threads:
    virtual:
      enabled: true
  cloud:
    config:
      enabled: false
    aws:
      parameterstore:
        region: us-east-1
  datasource:
    # En produccion lo sobreescribe SSM (/config/conocimiento-service/spring.datasource.url).
    # Fallback local: postgres en localhost con una BD 'conocimiento-db'.
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/conocimiento-db}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:admin}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 5000
      max-lifetime: 900000
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

# Carga los articulos base (planes de continuidad/DRP/respaldos y runbooks) si la BD esta vacia.
conocimiento:
  seed:
    enabled: ${CONOCIMIENTO_SEED_ENABLED:true}
