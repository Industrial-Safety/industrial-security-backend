server:
  port: 8080
  error:
    include-message: always
    include-stacktrace: never

spring:
  application:
    name: purchase-service
  config:
    import: aws-parameterstore:/config/application/,aws-parameterstore:/config/purchase-service/
  threads:
    virtual:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        jdbc:
          batch_size: 25
        order_inserts: true
        order_updates: true
  rabbitmq:
    listener:
      simple:
        prefetch: 10
        retry:
          enabled: true
          initial-interval: 1s
          multiplier: 2
          max-attempts: 3
          max-interval: 10s
    publisher-confirm-type: correlated
    publisher-returns: true
  cloud:
    aws:
      parameterstore:
        region: us-east-1
      stack:
        auto: false
  datasource:
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 5000
      max-lifetime: 900000

logging:
  level:
    com.logistica.purchase: INFO
    org.springframework.amqp: WARN
