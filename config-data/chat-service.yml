spring:
  application:
    name: chat-service
  threads:
    virtual:
      enabled: true
  data:
    mongodb:
      uri: mongodb://root:password@localhost:27020/chat-db?authSource=admin
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:9090/realms/industrial-safety

server:
  port: 8085
  error:
    include-message: always
    include-stacktrace: never

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
