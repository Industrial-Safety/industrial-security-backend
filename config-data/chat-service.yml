spring:
  application:
    name: chat-service
  threads:
    virtual:
      enabled: true
  data:
    mongodb:
      uri: mongodb://root:password@localhost:27020/chat-db?authSource=admin

server:
  port: 8085
  error:
    include-message: always
    include-stacktrace: never

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
