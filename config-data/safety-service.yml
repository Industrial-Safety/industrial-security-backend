server:
  port: 8099
spring:
  threads:
    virtual:
      enabled: true
  application:
    name: safety-service
  datasource:
    url: jdbc:postgresql://localhost:5440/safety-db
    username: admin
    password: admin
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    publisher-confirm-type: correlated
    publisher-returns: true

app:
  safety:
    points:
      base: 100
      casco: 20
      guantes: 5
      chaleco: 10