server:
  port: 8099
spring:
  threads:
    virtual:
      enabled: true
  application:
    name: safety-service
  datasource:
    url: jdbc:postgresql://localhost:5440/safety-db
    username: admin
    password: admin
    driver-class-name: org.postgresql.Driver
    jpa:
      hibernate:
        ddl-auto: update        # crea/actualiza tablas autom ticamente
      show-sql: true
      properties:
        hibernate:
          dialect: org.hibernate.dialect.PostgreSQLDialect
          format_sql: true