keycloak:
  server-url: ${KEYCLOAK_SERVER_URL}
  realm: industrial-safety
  admin:
    username: ${KEYCLOAK_ADMIN_USERNAME}
    password: ${KEYCLOAK_ADMIN_PASSWORD}

server:
  port: 8081
spring:
  threads:
    virtual:
      enabled: true
  application:
    name: user-service
  datasource:
    url: jdbc:postgresql://localhost:5435/user-db?tcpKeepAlive=true
    username: admin
    password: admin
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      max-lifetime: 240000        # 4 min — rota antes de que docker/postgres maten la conexión
      idle-timeout: 120000        # 2 min idle y cerramos
      keepalive-time: 60000       # ping cada 60s a las conexiones idle
      connection-test-query: SELECT 1
      validation-timeout: 3000
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
cloud:
  aws:
    region:
      static: ${AWS_REGION}
    credentials:
      access-key: ${AWS_ACCESS_KEY_ID}
      secret-key: ${AWS_SECRET_ACCESS_KEY}
    stack:
      auto: false

aws:
  s3:
    bucket-name: ${AWS_BUCKET_NAME}

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true

resilience4j:
  circuitbreaker:
    instances:
      keycloak:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 15s
        permitted-number-of-calls-in-half-open-state: 3
        register-health-indicator: true
  retry:
    instances:
      keycloak:
        max-attempts: 3
        wait-duration: 500ms
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - jakarta.ws.rs.ProcessingException
          - java.net.ConnectException
          - java.io.IOException

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,circuitbreakers,retries
  endpoint:
    health:
      show-details: when_authorized