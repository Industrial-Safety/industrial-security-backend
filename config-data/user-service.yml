keycloak:
  server-url: ${KEYCLOAK_SERVER_URL}
  realm: industrial-safety
  admin:
    username: ${KEYCLOAK_ADMIN_USERNAME}
    password: ${KEYCLOAK_ADMIN_PASSWORD}

server:
  port: 8081
spring:
  threads:
    virtual:
      enabled: true
  application:
    name: user-service
  datasource:
    url: jdbc:postgresql://localhost:5435/user-db?tcpKeepAlive=true
    username: admin
    password: admin
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      max-lifetime: 240000        # 4 min — rota antes de que docker/postgres maten la conexión
      idle-timeout: 120000        # 2 min idle y cerramos
      keepalive-time: 60000       # ping cada 60s a las conexiones idle
      connection-test-query: SELECT 1
      validation-timeout: 3000
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
cloud:
  aws:
    region:
      static: ${AWS_REGION}
    credentials:
      access-key: ${AWS_ACCESS_KEY_ID}
      secret-key: ${AWS_SECRET_ACCESS_KEY}
    stack:
      auto: false

aws:
  s3:
    bucket-name: ${AWS_BUCKET_NAME}

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true