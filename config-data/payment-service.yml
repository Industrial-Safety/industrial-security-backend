server:
  port: 8083
  error:
    include-message: always
    include-stacktrace: never

spring:
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:postgresql://localhost:5437/payment-db
    username: admin
    password: admin
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        jdbc:
          batch_size: 25
        order_inserts: true
        order_updates: true
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    listener:
      simple:
        acknowledge-mode: manual
        prefetch: 10
        retry:
          enabled: true
          initial-interval: 1s
          multiplier: 2
          max-attempts: 3
          max-interval: 10s
    publisher-confirm-type: correlated
    publisher-returns: true
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:9090/realms/industrial-safety

stripe:
  api:
    base-url: ${STRIPE_BASE_URL:https://api.stripe.com}
    secret-key: ${STRIPE_SECRET_KEY:sk_test_simulator_4242}
    webhook-secret: ${STRIPE_WEBHOOK_SECRET:whsec_simulator_local}
    timeout-millis: 5000
  simulator:
    enabled: true
    success-card: "4242424242424242"
    decline-card: "4000000000000002"

receipt:
  storage:
    output-dir: ${RECEIPT_OUTPUT_DIR:./receipts}
    public-base-url: ${RECEIPT_PUBLIC_BASE_URL:http://localhost:8083/api/v1/payments/receipts}

resilience4j:
  circuitbreaker:
    instances:
      stripe:
        sliding-window-size: 20
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 5
        register-health-indicator: true
  retry:
    instances:
      stripe:
        max-attempts: 3
        wait-duration: 500ms
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - org.springframework.web.reactive.function.client.WebClientRequestException
          - java.io.IOException

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,circuitbreakers,retries
  endpoint:
    health:
      show-details: when_authorized

logging:
  level:
    com.industrial.safety: INFO
    org.springframework.amqp: WARN
