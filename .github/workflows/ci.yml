name: CI — Industrial Safety Backend

on:
  push:
    branches: [ main, develop, "pruebas" ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: read
  checks: write
  pull-requests: write

env:
  JAVA_VERSION: "25"
  MAVEN_OPTS: "-Xmx2048m"
  TESTCONTAINERS_RYUK_DISABLED: "true"

jobs:
  # ============================================================
  #  JOB 0 — DETECTAR SERVICIOS MODIFICADOS
  # ============================================================
  detect-changes:
    name: "Detectar cambios"
    runs-on: ubuntu-latest
    outputs:
      unit_matrix: ${{ steps.matrix.outputs.unit }}
      it_matrix:   ${{ steps.matrix.outputs.it }}
      run_unit:    ${{ steps.matrix.outputs.run_unit }}
      run_it:      ${{ steps.matrix.outputs.run_it }}
    steps:
      - uses: actions/checkout@v4

      - name: Filtrar servicios modificados
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            safety-service:
              - 'safety-service/**'
            purchase-service:
              - 'purchase-service/**'
            course-service:
              - 'course-service/**'
            exam-service:
              - 'exam-service/**'
            chat-service:
              - 'chat-service/**'
            order-service:
              - 'order-service/**'
            payment-service:
              - 'payment-service/**'
            user-service:
              - 'user-service/**'
            notification-service:
              - 'notification-service/**'
            incidencias-service:
              - 'incidencias-service/**'
            eventos-service:
              - 'eventos-service/**'
            conocimiento-service:
              - 'conocimiento-service/**'
            api-gateway:
              - 'api-gateway/**'
            ci-workflow:
              - '.github/workflows/**'

      - name: Construir matrices dinámicas
        id: matrix
        run: |
          # Si cambió el workflow de CI, correr todos los servicios
          # incidencias/eventos/conocimiento solo corren unit (sin Testcontainers/JaCoCo aun), como api-gateway
          if [ "${{ steps.filter.outputs.ci-workflow }}" = "true" ]; then
            UNIT='["safety-service","purchase-service","course-service","exam-service","chat-service","order-service","payment-service","user-service","notification-service","incidencias-service","eventos-service","conocimiento-service","api-gateway"]'
            IT='["safety-service","purchase-service","course-service","exam-service","chat-service","order-service","payment-service","user-service","notification-service"]'
          else
            CHANGES='${{ steps.filter.outputs.changes }}'
            UNIT=$(echo "$CHANGES" | jq -c '[.[] | select(. != "ci-workflow")]')
            IT=$(echo "$CHANGES"   | jq -c '[.[] | select(. != "ci-workflow" and . != "api-gateway" and . != "incidencias-service" and . != "eventos-service" and . != "conocimiento-service")]')
          fi

          UNIT_LEN=$(echo "$UNIT" | jq 'length')
          IT_LEN=$(echo "$IT"   | jq 'length')

          echo "unit=$UNIT"                                                   >> $GITHUB_OUTPUT
          echo "it=$IT"                                                       >> $GITHUB_OUTPUT
          echo "run_unit=$([ "$UNIT_LEN" -gt 0 ] && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "run_it=$([ "$IT_LEN"   -gt 0 ] && echo true || echo false)"  >> $GITHUB_OUTPUT

  # ============================================================
  #  JOB 1 — PRUEBAS UNITARIAS (rápidas, sin Docker)
  # ============================================================
  unit-tests:
    name: "Unit — ${{ matrix.service }}"
    needs: detect-changes
    if: needs.detect-changes.outputs.run_unit == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.unit_matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Ejecutar pruebas unitarias — ${{ matrix.service }}
        working-directory: ${{ matrix.service }}
        run: |
          mvn test \
            -Dspring.profiles.active=test \
            -Dgroups="!integration" \
            -Dsurefire.failIfNoSpecifiedTests=false \
            --no-transfer-progress

      - name: Generar reporte JaCoCo — ${{ matrix.service }}
        working-directory: ${{ matrix.service }}
        run: mvn jacoco:report --no-transfer-progress
        continue-on-error: true

      - name: Subir reporte de cobertura
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-${{ matrix.service }}
          path: ${{ matrix.service }}/target/site/jacoco/
          if-no-files-found: ignore

      - name: Publicar resultados JUnit XML
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: "Unit Tests — ${{ matrix.service }}"
          path: "${{ matrix.service }}/target/surefire-reports/*.xml"
          reporter: java-junit
          fail-on-error: false

  # ============================================================
  #  JOB 2 — PRUEBAS DE INTEGRACIÓN (Testcontainers, requiere Docker)
  # ============================================================
  integration-tests:
    name: "IT — ${{ matrix.service }}"
    needs: [ detect-changes, unit-tests ]
    if: |
      always() &&
      needs.detect-changes.outputs.run_it == 'true' &&
      contains(fromJson('["success","skipped"]'), needs.unit-tests.result)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.it_matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Ejecutar pruebas de integración — ${{ matrix.service }}
        working-directory: ${{ matrix.service }}
        run: |
          mvn test-compile failsafe:integration-test failsafe:verify \
            -Dspring.profiles.active=test \
            -Dgroups="integration" \
            --no-transfer-progress

      - name: Publicar resultados Failsafe XML
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: "Integration Tests — ${{ matrix.service }}"
          path: "${{ matrix.service }}/target/failsafe-reports/TEST-*.xml"
          reporter: java-junit
          fail-on-error: false

  # ============================================================
  #  JOB 3 — VERIFICACIÓN DE COBERTURA GLOBAL (JaCoCo)
  # ============================================================
  coverage-check:
    name: "Cobertura ≥ 80% — ${{ matrix.service }}"
    needs: [ detect-changes, unit-tests, integration-tests ]
    if: |
      always() &&
      needs.detect-changes.outputs.run_it == 'true' &&
      contains(fromJson('["success","skipped"]'), needs.unit-tests.result) &&
      contains(fromJson('["success","skipped"]'), needs.integration-tests.result)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.it_matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Verificar umbral de cobertura — ${{ matrix.service }}
        working-directory: ${{ matrix.service }}
        run: |
          mvn verify \
            -Dspring.profiles.active=test \
            --no-transfer-progress
