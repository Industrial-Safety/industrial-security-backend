name: CI — Industrial Safety Backend

on:
  push:
    branches: [ main, develop, "pruebas" ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: read
  checks: write
  pull-requests: write

env:
  JAVA_VERSION: "25"
  MAVEN_OPTS: "-Xmx2048m"

jobs:
  # ============================================================
  #  JOB 1 — PRUEBAS UNITARIAS (rápidas, sin Docker)
  # ============================================================
  unit-tests:
    name: "Unit — ${{ matrix.service }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - safety-service
          - purchase-service
          - course-service
          - exam-service
          - chat-service
          - order-service
          - payment-service
          - user-service
          - notification-service
          - api-gateway
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Ejecutar pruebas unitarias — ${{ matrix.service }}
        working-directory: ${{ matrix.service }}
        run: |
          mvn test \
            -Dspring.profiles.active=test \
            -Dgroups="!integration" \
            -Dsurefire.failIfNoSpecifiedTests=false \
            --no-transfer-progress

      - name: Generar reporte JaCoCo — ${{ matrix.service }}
        working-directory: ${{ matrix.service }}
        run: mvn jacoco:report --no-transfer-progress
        continue-on-error: true

      - name: Subir reporte de cobertura
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-${{ matrix.service }}
          path: ${{ matrix.service }}/target/site/jacoco/
          if-no-files-found: ignore

      - name: Publicar resultados JUnit XML
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: "Unit Tests — ${{ matrix.service }}"
          path: "${{ matrix.service }}/target/surefire-reports/*.xml"
          reporter: java-junit
          fail-on-error: false

  # ============================================================
  #  JOB 2 — PRUEBAS DE INTEGRACIÓN (Testcontainers, requiere Docker)
  # ============================================================
  integration-tests:
    name: "IT — ${{ matrix.service }}"
    needs: unit-tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - safety-service
          - purchase-service
          - course-service
          - exam-service
          - chat-service
          - order-service
          - payment-service
          - user-service
          - notification-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Ejecutar pruebas de integración — ${{ matrix.service }}
        working-directory: ${{ matrix.service }}
        run: |
          mvn test-compile failsafe:integration-test failsafe:verify \
            -Dspring.profiles.active=test \
            -Dgroups="integration" \
            --no-transfer-progress

      - name: Publicar resultados Failsafe XML
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: "Integration Tests — ${{ matrix.service }}"
          path: "${{ matrix.service }}/target/failsafe-reports/*.xml"
          reporter: java-junit
          fail-on-error: false

  # ============================================================
  #  JOB 3 — VERIFICACIÓN DE COBERTURA GLOBAL (JaCoCo)
  # ============================================================
  coverage-check:
    name: "Cobertura ≥ 80% — ${{ matrix.service }}"
    needs: [ unit-tests, integration-tests ]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - safety-service
          - purchase-service
          - course-service
          - exam-service
          - chat-service
          - order-service
          - payment-service
          - user-service
          - notification-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Verificar umbral de cobertura — ${{ matrix.service }}
        working-directory: ${{ matrix.service }}
        run: |
          mvn verify \
            -Dspring.profiles.active=test \
            --no-transfer-progress
