name: CD — Deploy to AWS ECS

# CD en PAUSA durante desarrollo: solo se ejecuta de forma MANUAL (no auto-deploy en cada push).
# Para reactivar el auto-deploy, descomentar el bloque workflow_run y quitar workflow_dispatch.
on:
  workflow_dispatch: {}
  # workflow_run:
  #   workflows: ["CI — Industrial Safety Backend"]
  #   types: [completed]
  #   branches: [main]

permissions:
  id-token: write   # necesario para OIDC con AWS
  contents: read

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
  ECS_CLUSTER: ${{ secrets.ECS_CLUSTER }}
  JAVA_VERSION: "25"
  MAVEN_OPTS: "-Xmx2048m"

jobs:
  deploy:
    name: "Deploy — ${{ matrix.service }}"
    runs-on: ubuntu-latest

    # workflow_dispatch: siempre; workflow_run: solo si CI pasó
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    strategy:
      fail-fast: false   # si un servicio falla, los demás siguen
      # NOTA: 'ecr' usa el prefijo real del repositorio en ECR (industrial-security/...)
      #       'ecs' usa el nombre EXACTO del servicio en ECS (incluye el sufijo generado).
      matrix:
        include:
          - { service: safety-service,       ecr: industrial-security/safety-service,       ecs: safety-service }
          - { service: purchase-service,     ecr: industrial-security/purchase-service,     ecs: purchase-service }
          - { service: solicitudes-service,  ecr: industrial-security/solicitudes-service,  ecs: solicitudes-service }
          - { service: course-service,       ecr: industrial-security/course-service,       ecs: course-service }
          - { service: exam-service,         ecr: industrial-security/exam-service,         ecs: exam-service }
          - { service: chat-service,         ecr: industrial-security/chat-service,         ecs: chat-service }
          - { service: order-service,        ecr: industrial-security/order-service,        ecs: order-service }
          - { service: payment-service,      ecr: industrial-security/payment-service,      ecs: payment-service }
          - { service: user-service,         ecr: industrial-security/user-service,         ecs: user-service }
          - { service: notification-service, ecr: industrial-security/notification-service, ecs: notification-service }
          - { service: incidencias-service,  ecr: industrial-security/incidencias-service,  ecs: incidencias-service }
          - { service: eventos-service,      ecr: industrial-security/eventos-service,      ecs: eventos-service }
          - { service: conocimiento-service, ecr: industrial-security/conocimiento-service, ecs: conocimiento-service }
          - { service: api-gateway,          ecr: industrial-security/api-gateway,          ecs: api-gateway }

    steps:
      # ── 1. Checkout del commit exacto que pasó el CI ──────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      # ── 2. Compilar JAR ───────────────────────────────────────────────
      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Build JAR — ${{ matrix.service }}
        working-directory: ${{ matrix.service }}
        run: mvn package -DskipTests --no-transfer-progress

      # ── 3. Autenticarse en AWS via OIDC (sin credenciales estáticas) ──
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # ── 4. Login a ECR ────────────────────────────────────────────────
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ── 5a. Crear log group CloudWatch (idempotente) ─────────────────
      - name: Crear log group CloudWatch — ${{ matrix.service }}
        run: |
          aws logs create-log-group \
            --log-group-name /ecs/${{ matrix.service }} \
            --region $AWS_REGION 2>/dev/null || true

      # ── 5. Build + tag + push imagen Docker ──────────────────────────
      - name: Build, tag y push imagen Docker — ${{ matrix.service }}
        env:
          IMAGE_TAG: ${{ github.event.workflow_run.head_sha || github.sha }}
        run: |
          cd ${{ matrix.service }}
          docker build -t $ECR_REGISTRY/${{ matrix.ecr }}:$IMAGE_TAG .
          docker tag  $ECR_REGISTRY/${{ matrix.ecr }}:$IMAGE_TAG \
                      $ECR_REGISTRY/${{ matrix.ecr }}:latest
          docker push $ECR_REGISTRY/${{ matrix.ecr }}:$IMAGE_TAG
          docker push $ECR_REGISTRY/${{ matrix.ecr }}:latest

      # ── 6. Registrar NUEVA task definition con la imagen recién subida ──
      #     Si la familia no existe todavía, usa el template de deploy/task-definitions/.
      #     Si ya existe, actualiza la revisión activa con la nueva imagen.
      #     El update-service es best-effort: puede no existir el servicio ECS aún.
      - name: Registrar task definition y desplegar — ${{ matrix.service }}
        continue-on-error: true
        env:
          IMAGE_TAG: ${{ github.event.workflow_run.head_sha || github.sha }}
        run: |
          IMAGE="$ECR_REGISTRY/${{ matrix.ecr }}:$IMAGE_TAG"

          # Obtener task def existente o usar template del repo (primera vez)
          if ! aws ecs describe-task-definition --task-definition ${{ matrix.service }} \
              --query 'taskDefinition' --output json > task-def.json 2>/dev/null; then
            echo "Primera vez: usando template deploy/task-definitions/${{ matrix.service }}.json"
            cp deploy/task-definitions/${{ matrix.service }}.json task-def.json
          fi

          # Reemplazar la imagen y quitar los campos que register-task-definition NO acepta
          jq --arg IMAGE "$IMAGE" '
            .containerDefinitions[0].image = $IMAGE
            | del(.taskDefinitionArn, .revision, .status, .requiresAttributes,
                  .compatibilities, .registeredAt, .registeredBy)
          ' task-def.json > new-task-def.json

          # Registrar la nueva revisión y capturar su ARN
          NEW_ARN=$(aws ecs register-task-definition \
            --cli-input-json file://new-task-def.json \
            --query 'taskDefinition.taskDefinitionArn' --output text)
          echo "Nueva task definition registrada: $NEW_ARN"

          # Apuntar el servicio a la nueva revisión (puede no existir el servicio aún)
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service ${{ matrix.ecs }} \
            --task-definition "$NEW_ARN" \
            --region $AWS_REGION \
            || echo "⚠ Servicio '${{ matrix.ecs }}' no existe aún — task def registrada OK"

      # ── 7. Esperar hasta que la nueva tarea esté RUNNING ─────────────
      - name: Esperar estabilidad — ${{ matrix.service }}
        continue-on-error: true
        run: |
          aws ecs wait services-stable \
            --cluster $ECS_CLUSTER \
            --services ${{ matrix.ecs }} \
            --region $AWS_REGION
