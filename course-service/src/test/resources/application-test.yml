spring:
  config:
    import: "optional:configserver:"
  cloud:
    config:
      enabled: false
  data:
    mongodb:
      uri: mongodb://localhost:27019/course-test
    redis:
      host: localhost
      port: 6379
  rabbitmq:
    host: localhost
    port: 5672
  security:
    oauth2:
      resourceserver:
        jwt:
          # jwk-set-uri se carga lazy (no OIDC discovery al startup); en tests se usa MockMvc jwt() postprocessor
          jwk-set-uri: http://localhost:9090/realms/industrial-safety/protocol/openid-connect/certs

cloud:
  aws:
    credentials:
      access-key: dummy-access-key
      secret-key: dummy-secret-key
    region:
      static: us-east-1

aws:
  s3:
    bucket-name: test-bucket

eureka:
  client:
    enabled: false
  instance:
    prefer-ip-address: false

logging:
  level:
    com.industrial.safety: DEBUG
    org.springframework.security: DEBUG
