spring:
  config:
    import: "optional:configserver:"
  cloud:
    config:
      enabled: false
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
  security:
    oauth2:
      resourceserver:
        jwt:
          # JWK uri solo es consultada al validar tokens reales; en tests se usa el jwt() post-processor
          jwk-set-uri: http://localhost:9090/realms/industrial-safety/protocol/openid-connect/certs

cloud:
  aws:
    credentials:
      access-key: dummy-access-key
      secret-key: dummy-secret-key
    region:
      static: us-east-1

aws:
  s3:
    bucket-name: test-bucket

eureka:
  client:
    enabled: false
  instance:
    prefer-ip-address: false

logging:
  level:
    com.industrial.safety: DEBUG
    org.springframework.security: DEBUG
