spring:
  application:
    name: course-service
  threads:
    virtual:
      enabled: true
  config:
    import: aws-parameterstore:/config/application/,aws-parameterstore:/config/course-service/
  cloud:
    aws:
      parameterstore:
        region: us-east-1
  data:
    mongodb:
      uri: ${MONGODB_URI}
    redis:
      lettuce:
        pool:
          max-active: 8
          max-idle: 4

server:
  port: 8080
  error:
    include-message: always
    include-stacktrace: never

# URL base de order-service para verificar propiedad del curso antes de reseñar.
# Local: http://localhost:8082 (o nombre Eureka). Prod AWS: DNS de Cloud Map.
services:
  order:
    base-url: ${ORDER_SERVICE_URL:http://order-service.industrial-security:8082}

resilience4j:
  circuitbreaker:
    instances:
      aws-s3:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 15s
        permitted-number-of-calls-in-half-open-state: 3
        register-health-indicator: true
  retry:
    instances:
      aws-s3:
        max-attempts: 3
        wait-duration: 500ms
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - software.amazon.awssdk.core.exception.SdkClientException
          - java.net.ConnectException
          - java.io.IOException

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,circuitbreakers,retries
  endpoint:
    health:
      show-details: when_authorized