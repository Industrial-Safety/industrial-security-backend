spring:
  config:
    import: "optional:configserver:"
  cloud:
    config:
      enabled: false
  rabbitmq:
    listener:
      simple:
        # Manual ack requerido por NotificationEventConsumer (channel.basicAck/basicNack)
        acknowledge-mode: manual
  mail:
    host: ""   # vacío → EmailService omite el envío real en tests

eureka:
  client:
    enabled: false

notification:
  email:
    from: no-reply@test.com
    from-name: Industrial Safety Tech (Test)
  websocket:
    endpoint: /ws
    user-destination-prefix: /user
    broker-prefix: /topic

logging:
  level:
    com.industrial.safety: DEBUG
    org.springframework.amqp: DEBUG
