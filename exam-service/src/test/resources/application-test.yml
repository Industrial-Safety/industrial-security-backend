spring:
  config:
    import: "optional:configserver:"
  cloud:
    config:
      enabled: false
    aws:
      parameterstore:
        enabled: false
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  security:
    oauth2:
      resourceserver:
        jwt:
          # JWK URI necesaria para que el resource server arranque; los tests usan jwt() post-processor
          jwk-set-uri: http://localhost:9999/jwks

cloud:
  aws:
    credentials:
      access-key: dummy-access-key
      secret-key: dummy-secret-key
    region:
      static: us-east-1

eureka:
  client:
    enabled: false
