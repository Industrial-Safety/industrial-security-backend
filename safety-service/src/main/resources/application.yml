server:
  port: 8099
  error:
    include-message: always
    include-stacktrace: never

spring:
  application:
    name: safety-service
  config:
    import: aws-parameterstore:/config/application/,aws-parameterstore:/config/safety-service/
  threads:
    virtual:
      enabled: true
  datasource:
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 5000
      max-lifetime: 900000
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
  cloud:
    aws:
      parameterstore:
        region: us-east-1
      stack:
        auto: false

app:
  safety:
    points:
      base: 100
      casco: 20
      guantes: 5
      chaleco: 10