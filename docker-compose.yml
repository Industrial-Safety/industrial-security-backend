version: '3.8'

services:

  # ── MongoDB ────────────────────────────────────────────
  mongodb:
    image: mongo:7.0.4
    container_name: mongodb
    ports:
      - "27019:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=password
    volumes:
      - mongo_data:/data/db

  # ── Keycloak DB ────────────────────────────────────────
  keycloak-db:
    image: postgres:16-alpine
    container_name: keycloak-db
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: password
      POSTGRES_DB: keycloak-db
    volumes:
      - keycloak_data:/var/lib/postgresql/data

  # ── User DB ────────────────────────────────────────────
  user-db:
    image: postgres:16-alpine
    container_name: user-db
    ports:
      - "5435:5432"
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: user-db
    volumes:
      - user_data:/var/lib/postgresql/data

  # ── Keycloak ───────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:24.0.1
    container_name: keycloak
    command: start-dev
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak-db
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: password
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "9090:8080"
    depends_on:
      - keycloak-db

  # ── EPP Master — recibe escrituras ────────────────────
  epp-master:
    image: postgres:16-alpine
    container_name: epp-master
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: safety_db
    volumes:
      - epp_master_data:/var/lib/postgresql/data
      - ./init/pg_hba.conf:/etc/postgresql/pg_hba.conf
      - ./init/master.conf:/etc/postgresql/postgresql.conf
      - ./init/init-master.sql:/docker-entrypoint-initdb.d/init.sql
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    networks:
      - epp-network

  # ── EPP Slave 1 — Dashboard jefe de seguridad ─────────
  epp-slave1:
    image: postgres:16-alpine
    container_name: epp-slave1
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      PGUSER: postgres
    volumes:
      - epp_slave1_data:/var/lib/postgresql/data
      - ./init/slave.conf:/etc/postgresql/postgresql.conf
    command: >
      bash -c "
      until pg_basebackup -h epp-master -U replicator -D /var/lib/postgresql/data -Fp -Xs -P -R;
      do
        echo 'Esperando master...'
        sleep 2
      done &&
      postgres -c config_file=/etc/postgresql/postgresql.conf
      "
    depends_on:
      - epp-master
    networks:
      - epp-network

  # ── EPP Slave 2 — Reportes gerencia ───────────────────
  epp-slave2:
    image: postgres:16-alpine
    container_name: epp-slave2
    ports:
      - "5436:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      PGUSER: postgres
    volumes:
      - epp_slave2_data:/var/lib/postgresql/data
      - ./init/slave.conf:/etc/postgresql/postgresql.conf
    command: >
      bash -c "
      until pg_basebackup -h epp-master -U replicator -D /var/lib/postgresql/data -Fp -Xs -P -R;
      do
        echo 'Esperando master...'
        sleep 2
      done &&
      postgres -c config_file=/etc/postgresql/postgresql.conf
      "
    depends_on:
      - epp-master
    networks:
      - epp-network

volumes:
  mongo_data:
  keycloak_data:
  user_data:
  epp_master_data:
  epp_slave1_data:
  epp_slave2_data:

networks:
  epp-network:
    driver: bridge