services:

  # ═══════════════════════════════════════════════════════════════
  # INFRASTRUCTURE
  # ═══════════════════════════════════════════════════════════════

  mongodb:
    image: mongo:7.0.4
    container_name: mongodb
    ports:
      - "27019:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=password
    volumes:
      - mongo_data:/data/db
    networks:
      - backend

  keycloak-db:
    image: postgres:16-alpine
    container_name: keycloak-db
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: password
      POSTGRES_DB: keycloak-db
    volumes:
      - keycloak_data:/var/lib/postgresql/data
    networks:
      - backend

  user-db:
    image: postgres:16-alpine
    container_name: user-db
    ports:
      - "5435:5432"
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: user-db
    volumes:
      - user_data:/var/lib/postgresql/data
    networks:
      - backend

  order-db:
    image: postgres:16-alpine
    container_name: order-db
    ports:
      - "5436:5432"
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: order-db
    volumes:
      - order_data:/var/lib/postgresql/data
    networks:
      - backend

  payment-db:
    image: postgres:16-alpine
    container_name: payment-db
    ports:
      - "5437:5432"
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: payment-db
    volumes:
      - payment_data:/var/lib/postgresql/data
    networks:
      - backend

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - backend

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.1
    container_name: keycloak
    command: start-dev
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak-db
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: password
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      # Hace que los tokens tengan iss: http://localhost:9090/...
      # (igual que cuando corres Keycloak desde IntelliJ)
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_BACKCHANNEL: "false"
    ports:
      - "9090:8080"
    depends_on:
      - keycloak-db
    networks:
      - backend

  # ═══════════════════════════════════════════════════════════════
  # SPRING CLOUD FOUNDATION
  # ═══════════════════════════════════════════════════════════════

  config-server:
    build: ./config-server
    container_name: config-server
    ports:
      - "8888:8888"
    environment:
      - JAVA_TOOL_OPTIONS=-Xmx256m
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8888/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - backend

  discovery-server:
    build: ./discovery-server
    container_name: discovery-server
    ports:
      - "8761:8761"
    environment:
      - JAVA_TOOL_OPTIONS=-Xmx256m
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8761/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - backend

  # ═══════════════════════════════════════════════════════════════
  # MICROSERVICES
  # ═══════════════════════════════════════════════════════════════

  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    ports:
      - "9000:9000"
    environment:
      - JAVA_TOOL_OPTIONS=-Xmx256m
      # Config server (override localhost:8888 del application.yaml)
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-server:8888
      # Eureka (override localhost:8761 del config-data)
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
      # OAuth2 cliente (browser redirect → localhost:9090; exchange → keycloak:8080)
      - SPRING_SECURITY_OAUTH2_CLIENT_PROVIDER_KEYCLOAK_AUTHORIZATION_URI=http://localhost:9090/realms/industrial-safety/protocol/openid-connect/auth
      - SPRING_SECURITY_OAUTH2_CLIENT_PROVIDER_KEYCLOAK_TOKEN_URI=http://keycloak:8080/realms/industrial-safety/protocol/openid-connect/token
      - SPRING_SECURITY_OAUTH2_CLIENT_PROVIDER_KEYCLOAK_JWK_SET_URI=http://keycloak:8080/realms/industrial-safety/protocol/openid-connect/certs
      - SPRING_SECURITY_OAUTH2_CLIENT_PROVIDER_KEYCLOAK_USER_INFO_URI=http://keycloak:8080/realms/industrial-safety/protocol/openid-connect/userinfo
      # Resource server JWT (valida firma, sin OIDC discovery)
      - SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI=http://keycloak:8080/realms/industrial-safety/protocol/openid-connect/certs
      # Secret del cliente Keycloak
      - SECRET=${SECRET}
    depends_on:
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
      keycloak:
        condition: service_started
    networks:
      - backend

  course-service:
    build: ./course-service
    container_name: course-service
    ports:
      - "8080:8080"
    environment:
      - JAVA_TOOL_OPTIONS=-Xmx256m
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-server:8888
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
      # MongoDB (override localhost:27019 → mongodb:27017 interno)
      - SPRING_DATA_MONGODB_URI=mongodb://root:password@mongodb:27017/course-db?authSource=admin
      # JWT: valida firma directamente sin OIDC discovery
      - SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI=http://keycloak:8080/realms/industrial-safety/protocol/openid-connect/certs
      # AWS
      - AWS_REGION=${AWS_REGION}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_BUCKET_NAME=${AWS_BUCKET_NAME}
    depends_on:
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
      mongodb:
        condition: service_started
    networks:
      - backend

  user-service:
    build: ./user-service
    container_name: user-service
    ports:
      - "8081:8081"
    environment:
      - JAVA_TOOL_OPTIONS=-Xmx256m
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-server:8888
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
      # DB (override localhost:5435 → user-db:5432 interno)
      - SPRING_DATASOURCE_URL=jdbc:postgresql://user-db:5432/user-db
      - DB_URL=jdbc:postgresql://user-db:5432/user-db
      - DB_USERNAME=admin
      - DB_PASSWORD=admin
      # Keycloak admin
      - KEYCLOAK_SERVER_URL=http://keycloak:8080
      - KEYCLOAK_ADMIN_USERNAME=${KEYCLOAK_ADMIN_USERNAME}
      - KEYCLOAK_ADMIN_PASSWORD=${KEYCLOAK_ADMIN_PASSWORD}
      # JWT
      - SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI=http://keycloak:8080/realms/industrial-safety/protocol/openid-connect/certs
      # AWS
      - AWS_REGION=${AWS_REGION}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_BUCKET_NAME=${AWS_BUCKET_NAME}
    depends_on:
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
      user-db:
        condition: service_started
      keycloak:
        condition: service_started
    networks:
      - backend

  order-service:
    build: ./order-service
    container_name: order-service
    ports:
      - "8082:8082"
    environment:
      - JAVA_TOOL_OPTIONS=-Xmx256m
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-server:8888
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
      # DB (override localhost:5436 → order-db:5432)
      - SPRING_DATASOURCE_URL=jdbc:postgresql://order-db:5432/order-db
      # RabbitMQ (override localhost → rabbitmq)
      - SPRING_RABBITMQ_HOST=rabbitmq
      # JWT
      - SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI=http://keycloak:8080/realms/industrial-safety/protocol/openid-connect/certs
    depends_on:
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
      order-db:
        condition: service_started
      rabbitmq:
        condition: service_started
    networks:
      - backend

  payment-service:
    build: ./payment-service
    container_name: payment-service
    ports:
      - "8083:8083"
    environment:
      - JAVA_TOOL_OPTIONS=-Xmx256m
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-server:8888
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
      # DB (override localhost:5437 → payment-db:5432)
      - SPRING_DATASOURCE_URL=jdbc:postgresql://payment-db:5432/payment-db
      # RabbitMQ
      - SPRING_RABBITMQ_HOST=rabbitmq
      # JWT
      - SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI=http://keycloak:8080/realms/industrial-safety/protocol/openid-connect/certs
      # MercadoPago
      - MP_ACCESS_TOKEN=${MP_ACCESS_TOKEN}
      - MP_WEBHOOK_SECRET=${MP_WEBHOOK_SECRET}
      # AWS
      - AWS_REGION=${AWS_REGION}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_BUCKET_NAME=${AWS_BUCKET_NAME}
    depends_on:
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
      payment-db:
        condition: service_started
      rabbitmq:
        condition: service_started
    networks:
      - backend

  notification-service:
    build: ./notification-service
    container_name: notification-service
    ports:
      - "8084:8084"
    environment:
      - JAVA_TOOL_OPTIONS=-Xmx256m
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-server:8888
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
      # RabbitMQ
      - SPRING_RABBITMQ_HOST=rabbitmq
      # Email
      - MAIL_USERNAME=${MAIL_USERNAME}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
    depends_on:
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
      rabbitmq:
        condition: service_started
    networks:
      - backend

volumes:
  mongo_data:
  keycloak_data:
  user_data:
  order_data:
  payment_data:
  rabbitmq_data:

networks:
  backend:
    driver: bridge
