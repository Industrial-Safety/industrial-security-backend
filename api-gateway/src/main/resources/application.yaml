server:
  port: 9000

spring:
  application:
    name: api-gateway
  config:
    import: aws-parameterstore:/config/application/,aws-parameterstore:/config/api-gateway/
  cloud:
    aws:
      parameterstore:
        region: us-east-1
      stack:
        auto: false
    gateway:
      default-filters:
        - TokenRelay
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://industrial-safety.duckdns.org:8080/realms/industrial-safety

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway,metrics

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    org.springframework.cloud.gateway.handler.RoutePredicateHandlerMapping: TRACE
    org.springframework.web.reactive: DEBUG
    org.springframework.security: DEBUG
    reactor.netty.http.client: INFO