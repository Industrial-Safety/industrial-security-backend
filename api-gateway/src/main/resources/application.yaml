server:
  port: 9000

spring:
  application:
    name: api-gateway
  config:
    import: aws-parameterstore:/config/application/,aws-parameterstore:/config/api-gateway/
  cloud:
    aws:
      parameterstore:
        region: us-east-1
      stack:
        auto: false
    gateway:
      default-filters:
        - TokenRelay
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://industrial-safety.duckdns.org:8080/realms/industrial-safety

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway,metrics

# Para depurar en runtime, subir el nivel vía Parameter Store
# (/config/api-gateway/logging.level...) sin tocar el código
logging:
  level:
    org.springframework.cloud.gateway: INFO
    org.springframework.web.reactive: INFO
    org.springframework.security: WARN
    reactor.netty.http.client: INFO