spring:
  config:
    import: "optional:configserver:"
  cloud:
    config:
      enabled: false
    aws:
      parameterstore:
        enabled: false
  security:
    oauth2:
      resourceserver:
        jwt:
          # jwk-set-uri no hace OIDC discovery al arrancar (a diferencia de issuer-uri).
          # En tests no hay Keycloak disponible, así que evitamos la llamada de startup.
          jwk-set-uri: "http://localhost:0/nonexistent-jwks"
