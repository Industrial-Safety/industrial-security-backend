spring:
  config:
    import: "optional:configserver:"
  cloud:
    config:
      enabled: false
  security:
    oauth2:
      client:
        registration:
          api-gateway-client:
            provider: keycloak
            client-id: dummy-client
            client-secret: dummy-secret
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope: openid, profile, email
        provider:
          keycloak:
            authorization-uri: http://localhost:9090/realms/industrial-safety/protocol/openid-connect/auth
            token-uri: http://localhost:9090/realms/industrial-safety/protocol/openid-connect/token
            jwk-set-uri: http://localhost:9090/realms/industrial-safety/protocol/openid-connect/certs
            user-info-uri: http://localhost:9090/realms/industrial-safety/protocol/openid-connect/userinfo
            user-name-attribute: preferred_username
      resourceserver:
        jwt:
          jwk-set-uri: http://localhost:9090/realms/industrial-safety/protocol/openid-connect/certs

eureka:
  client:
    enabled: false
