spring:
  config:
    import: "optional:configserver:"
  cloud:
    config:
      enabled: false
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  security:
    oauth2:
      resourceserver:
        jwt:
          # JWK URI necesaria para que el resource server arranque; tests usan jwt() post-processor
          jwk-set-uri: http://localhost:9999/jwks

aws:
  s3:
    bucket-name: test-bucket

cloud:
  aws:
    credentials:
      access-key: test-access-key
      secret-key: test-secret-key
    region:
      static: us-east-1

mercadopago:
  api:
    base-url: https://api.test.mercadopago.com
    access-token: TEST-fake-token
    timeout-millis: 5000
  webhook:
    secret: test-webhook-secret

eureka:
  client:
    enabled: false
