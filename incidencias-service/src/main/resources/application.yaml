server:
  port: 8087

spring:
  application:
    name: incidencias-service
  config:
    import: "aws-parameterstore:/config/application/,aws-parameterstore:/config/incidencias-service/"
  threads:
    virtual:
      enabled: true
  cloud:
    config:
      enabled: false
    aws:
      parameterstore:
        region: us-east-1
  datasource:
    url: jdbc:postgresql://db-industrial-safety.cavogy2wu2yn.us-east-1.rds.amazonaws.com:5432/incidencias-db?sslmode=require&tcpKeepAlive=true
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:admin}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 5000
      max-lifetime: 900000
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:guest}
    password: ${SPRING_RABBITMQ_PASSWORD:guest}
    ssl:
      enabled: ${SPRING_RABBITMQ_SSL_ENABLED:false}
    listener:
      simple:
        # Reintentos antes de mandar el mensaje de sync a la DLQ
        retry:
          enabled: true
          max-attempts: 3
          initial-interval: 2000
          multiplier: 2
          max-interval: 10000
        default-requeue-rejected: false

# Habilita/silencia la publicacion de notificaciones (WebSocket/email) al reportero.
incidencias:
  notificaciones:
    enabled: ${INCIDENCIAS_NOTIF_ENABLED:true}
  # Triaje asistido por IA (Amazon Bedrock). enabled=false -> todo corre por reglas.
  ia:
    enabled: ${INCIDENCIAS_IA_ENABLED:false}
    region: ${INCIDENCIAS_IA_REGION:us-east-1}
    model-id: ${INCIDENCIAS_IA_MODEL_ID:us.anthropic.claude-haiku-4-5-20251001-v1:0}
    # Perfil AWS local (ej. "nueva"). Vacio en produccion -> usa el task role de ECS.
    aws-profile: ${INCIDENCIAS_IA_AWS_PROFILE:}

# Integracion con Jira Cloud (mesa de ayuda externa - ITSM).
# enabled=false por defecto: las incidencias se gestionan igual en la BD sin ticket externo.
jira:
  enabled: ${JIRA_ENABLED:false}
  base-url: ${JIRA_BASE_URL:https://industrialsafety.atlassian.net}
  email: ${JIRA_EMAIL:}
  api-token: ${JIRA_API_TOKEN:}
  project-key: ${JIRA_PROJECT_KEY:GES}
  issue-type: ${JIRA_ISSUE_TYPE:Tarea}
